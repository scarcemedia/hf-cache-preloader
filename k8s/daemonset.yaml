apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hf-cache-preloader
  namespace: model-serving
  labels:
    app.kubernetes.io/name: hf-cache-preloader
    app.kubernetes.io/component: model-cache
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hf-cache-preloader
      app.kubernetes.io/component: model-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hf-cache-preloader
        app.kubernetes.io/component: model-cache
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      terminationGracePeriodSeconds: 15
      containers:
        - name: hf-cache-preloader
          image: ghcr.io/scarcemedia/hf-cache-preloader:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HF_HOME
              value: /models/huggingface
            - name: HF_HUB_CACHE
              value: /models/huggingface/hub
            - name: CONFIG_PATH
              value: /config/models.yaml
            - name: LOOP_INTERVAL_SECONDS
              value: "10"
            - name: LOG_LEVEL
              value: INFO
            - name: HEALTH_HOST
              value: 0.0.0.0
            - name: HEALTH_PORT
              value: "8080"
            # Optional Hugging Face compatible proxy endpoint.
            # - name: HF_ENDPOINT
            #   value: https://hf-proxy.example.internal
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: hf-cache
              mountPath: /models/huggingface
              readOnly: false
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: hf-cache
          hostPath:
            path: /var/lib/huggingface
            type: DirectoryOrCreate
        - name: config
          configMap:
            name: hf-cache-preloader-config
